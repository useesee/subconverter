# ========== 规则 ==========
rules:

  # =========================================================
  # 0️⃣ 自定义（灵活调整）
  # =========================================================
  - RULE-SET,cusDirect,🎯 全球直连
  - RULE-SET,cusOth,💠 三方跳动
  # - RULE-SET,cusDomestic,🇨🇳 华夏之声

  # =========================================================
  # 0️⃣ 局域网（必须最前）
  # =========================================================
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve

  # =========================================================
  # 1️⃣ 广告拦截（最高优先级）
  # =========================================================
  # 全量广告库
  - GEOSITE,category-ads-all,🆎 AdBlock
  # 补强（保留少量 rule-provider）
  - RULE-SET,BanEasyList,🆎 AdBlock
  - RULE-SET,BanEasyPrivacy,🆎 AdBlock


  # =========================================================
  # 2️⃣ 精确规则（高优先级，必须在最前）
  # =========================================================
  # 🤖 AI 服务（精确优先）
  - GEOSITE,openai,🤖 人工智能
  - RULE-SET,AI,🤖 人工智能
  - RULE-SET,OpenAi,🤖 人工智能
  # - DOMAIN-SUFFIX,ai.google.dev,🤖 人工智能
  # - DOMAIN-SUFFIX,gemini.google.com,🤖 人工智能
  # - DOMAIN-SUFFIX,anthropic.com,🤖 人工智能
  # - DOMAIN-SUFFIX,claude.ai,🤖 人工智能
  # - DOMAIN-SUFFIX,perplexity.ai,🤖 人工智能
  # 🍎 Apple 服务
  - GEOSITE,apple,🍎 苹果服务
  # Ⓜ️ Microsoft 服务
  - GEOSITE,microsoft,Ⓜ️ 微软服务
  # 📱 Telegram（高动态服务，三层防漏）
  - GEOSITE,telegram,🔘 环球飞行
  - DOMAIN-KEYWORD,telegram,🔘 环球飞行
  # YouTube 服务
  - GEOSITE,youtube,🔘 环球飞行
  # 🌐 Google 生态（含API / Gemini底层）
  - GEOSITE,google,🔘 环球飞行


  # =========================================================
  # 3️⃣ ASN 精细控制（CDN / 云服务修正，核心优化：防 CDN 误判）
  # =========================================================
  # 🌐 Google 网络（YouTube / Gemini / API）
  - IP-ASN,15169,🔘 环球飞行  # Google LLC
  # ☁️ Cloudflare CDN（大量国外网站/CDN加速网络）
  - IP-ASN,13335,🔘 环球飞行  # Cloudflare, Inc.
  # ☁️ Amazon AWS（OpenAI / API / 流媒体后端）
  - IP-ASN,16509,🔘 环球飞行  # Amazon.com, Inc.
  # ☁️ Microsoft Azure（Copilot / Office / Bing）
  - IP-ASN,8075,🔘 环球飞行   # Microsoft Corporation
  # 📱 Telegram 官方
  - IP-ASN,62041,🔘 环球飞行  # Telegram Messenger Inc.


  # =========================================================
  # 4️⃣ 国外 / 国内分流
  # =========================================================
  # 🌍 非中国流量（大范围）
  - GEOSITE,geolocation-!cn,🔘 环球飞行
  # 🇨🇳 中国网站
  - GEOSITE,cn,🎯 全球直连


  # =========================================================
  # 5️⃣ IP 兜底
  # =========================================================
  # 🇨🇳 国内 IP
  - GEOIP,CN,🎯 全球直连


  # =========================================================
  # 6️⃣ 最终兜底
  # =========================================================
  - MATCH,🐟 漏网之鱼
