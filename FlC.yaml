mixed-port: 7890
allow-lan: true
mode: rule
log-level: info


# ================= DNSпјҲеўһејәзЁіе®ҡжҖ§пјү =================
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 1.1.1.1


# ========== д»ЈзҗҶи®ўйҳ… ==========
proxy-providers:

  Aaas:
    type: http
    url: "https://sub.store/download/collection/aaas?target=ClashMeta"
    path: ./providers/proxies/Aaas.yaml
    interval: 90000
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

  Saas:
    type: http
    # url: "https://sub.store/download/collection/aaas?target=V2Ray"
    # url: "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub"
    url: "https://raw.githubusercontent.com/useesee/subconverter/refs/heads/master/proxy.yaml"
    path: ./providers/proxies/Saas.yaml
    interval: 90000
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204


# ========== д»ЈзҗҶз»„ ==========
proxy-groups:

  - name: рҹ”ҳ зҺҜзҗғйЈһиЎҢ
    include-all: false
    type: select
    use:
      - Aaas
      - Saas
    # filter: ^((?!и§Јй”Ғ|зҫӨ|е…Қиҙ№|зҪ‘жҳ“|иҜ•з”Ё|иҝҮжңҹ).)*$
    proxies:
      - рҹҡҒ еӨ©жңәжҷәз”ұ
      - рҹҮәрҹҮё зҫҺеҢәй©ҝз«ҷ
      - рҹҮёрҹҮ¬ ж–°еҢәй©ҝз«ҷ
      - рҹҺЎ иҙҹиҪҪеқҮиЎЎ
      - DIRECT

  - name: рҹҡҒ еӨ©жңәжҷәз”ұ
    include-all: false
    type: url-test
    use:
      - Aaas
      - Saas
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # ================= еӣҪе®¶еҲҶз»„ =================

  - name: рҹҮәрҹҮё зҫҺеҢәй©ҝз«ҷ
    include-all: false
    type: url-test
    use:
      - Aaas
    # filter: (?i)us|united states|america|зҫҺ
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: рҹҮёрҹҮ¬ ж–°еҢәй©ҝз«ҷ
    include-all: false
    type: url-test
    use:
      - Saas
    # filter: (?i)sg|singapore|ж–°
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: рҹҺЎ иҙҹиҪҪеқҮиЎЎ
    type: load-balance
    use:
      - Aaas
      - Saas
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: рҹҗҹ жјҸзҪ‘д№Ӣйұј
    type: select
    proxies:
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ
      - рҹ”ҳ зҺҜзҗғйЈһиЎҢ

  - name: рҹӨ– дәәе·ҘжҷәиғҪ
    type: select
    use:
      - Aaas
      - Saas
    proxies:
      - рҹ”ҳ зҺҜзҗғйЈһиЎҢ

  - name: рҹ’  дёүж–№и·іеҠЁ
    type: select
    proxies:
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ
      - рҹ”ҳ зҺҜзҗғйЈһиЎҢ

  - name: рҹҗү еҚҺеӨҸд№ӢеЈ°
    type: select
    proxies:
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ
      - рҹ”ҳ зҺҜзҗғйЈһиЎҢ

  - name: в“ӮпёҸ еҫ®иҪҜжңҚеҠЎ
    type: select
    proxies:
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ
      - рҹ”ҳ зҺҜзҗғйЈһиЎҢ

  - name: рҹҚҺ иӢ№жһңжңҚеҠЎ
    type: select
    proxies:
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ
      - рҹ”ҳ зҺҜзҗғйЈһиЎҢ

  - name: рҹҺө зҪ‘жҳ“йҹід№җ
    type: select
    proxies:
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ

  - name: рҹҢҚ зҺҜзҗғи§Ҷеҗ¬
    type: select
    proxies:
      - рҹ”ҳ зҺҜзҗғйЈһиЎҢ
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ

  - name: рҹҺҜ е…Ёзҗғзӣҙиҝһ
    type: select
    proxies:
      - DIRECT
      - рҹ”ҳ зҺҜзҗғйЈһиЎҢ

  - name: рҹӣ‘ е…ЁзҗғжӢҰжҲӘ
    type: select
    proxies:
      - REJECT
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ

  - name: рҹ”Ҙ еә”з”ЁеҮҖеҢ–
    type: select
    proxies:
      - REJECT
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ

  - name: рҹҶҺ AdBlock
    type: select
    proxies:
      - REJECT
      - рҹҺҜ е…Ёзҗғзӣҙиҝһ


